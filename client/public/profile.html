<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting - QuickBite</title>
</head>
<body>
    <script>
        (function () {
            try {
                const user = JSON.parse(localStorage.getItem("quickbite-auth-user")) || {};
                const role = String((user && user.role) || "").toLowerCase();
                window.location.replace(role === "vendor" ? "admin-dashboard.html" : "customer-dashboard.html#overview");
            } catch (error) {
                window.location.replace("customer-dashboard.html#overview");
            }
        })();
    </script>
</body>
</html>
